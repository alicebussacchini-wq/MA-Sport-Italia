name: Weekly M&A Sport Italia Scrape

on:
  schedule:
    # Ogni lunedì alle 07:00 UTC (09:00 ora italiana)
    - cron: "0 7 * * 1"
  workflow_dispatch: # Permette esecuzione manuale

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credentials file
        env:
          GCP_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          mkdir -p credentials
          printf '%s' "$GCP_CREDS" > credentials/service_account.json

      - name: Run scraping pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: credentials/service_account.json
          GOOGLE_SHEETS_SPREADSHEET_NAME: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_NAME || 'MA_Sport_Italia' }}
        run: python main.py
